<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stella Maris Chat Widget</title>
    <link rel="stylesheet" href="/static/style.css?v=3">
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #ffffff;
        }

        body.widget-embed-body {
            background: #ffffff;
        }

        .widget-embed-body #chatbot {
            position: relative;
            right: auto;
            bottom: auto;
            width: 100%;
            height: 100%;
            border-radius: 0;
            box-shadow: none;
            backdrop-filter: none;
            background: #ffffff;
        }
    </style>
    <script type="text/javascript">
        window.SMC_CHAT_CONFIG = {
            chatEndpoint: "/chat",
            resetEndpoint: "/reset-chat"
        };
    </script>
</head>
<body class="widget-embed-body">
    <div id="chatbot">
        <div id="chatbox"></div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask anything..." />
            <button onclick="sendMessage()" class="send-btn" type="button">Send</button>
        </div>
    </div>

    <script src="/static/script.js?v=6" defer></script>
</body>
</html>
